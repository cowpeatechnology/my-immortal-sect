<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>SlgGame ChatGPT Bridge</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        color: #1f2937;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: #475569;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        margin-bottom: 10px;
        background: white;
      }

      .status {
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        font-size: 12px;
        color: #334155;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        background: #0f766e;
        color: white;
      }

      button.secondary {
        background: #334155;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        min-height: 120px;
        margin: 0;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>SlgGame ChatGPT Bridge</h1>
    <label for="serverBase">Server Base</label>
    <input id="serverBase" value="http://127.0.0.1:8765" />
    <div id="workerInfo" class="status">工作页：读取中...</div>
    <div class="row">
      <button id="bind">绑定工作页</button>
      <button id="unbind" class="secondary">解除绑定</button>
    </div>
    <div class="row">
      <button id="save">保存</button>
      <button id="status" class="secondary">页面状态</button>
      <button id="poll" class="secondary">立即轮询</button>
    </div>
    <pre id="output">loading...</pre>
    <script src="popup.js"></script>
  </body>
  </html>
