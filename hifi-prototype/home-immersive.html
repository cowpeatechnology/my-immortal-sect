<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主城实机定稿图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="immersive-body immersive-body--final">
    <div class="atmosphere"></div>
    <div class="grain"></div>

    <main class="cinematic-stage">
      <section class="screen final-home screen-enter">
        <header class="final-home__hud">
          <div class="sect-seal">
            <div class="sect-seal__crest">
              <span class="sect-seal__roof"></span>
            </div>
            <div class="sect-seal__copy">
              <span class="sect-seal__tag">主城实机演示</span>
              <strong>无极仙宗</strong>
            </div>
          </div>

          <div class="resource-ribbon final-resource-ribbon">
            <div class="resource-chip">
              <span class="resource-dot">木</span>
              <span>木材 <b id="resourceWood">268</b></span>
            </div>
            <div class="resource-chip">
              <span class="resource-dot">石</span>
              <span>石料 <b id="resourceStone">154</b></span>
            </div>
            <div class="resource-chip">
              <span class="resource-dot">草</span>
              <span>灵草 <b id="resourceHerb">82</b></span>
            </div>
            <div class="resource-chip">
              <span class="resource-dot">香</span>
              <span>香火 <b id="resourceFaith">48</b></span>
            </div>
          </div>
        </header>

        <div class="final-home__topline">
          <span class="scene-chip" id="sceneClock">第 12 日 · 辰时</span>
          <span class="scene-chip scene-chip--muted" id="sceneShift">白昼作业段</span>
          <span class="scene-chip scene-chip--accent" id="sceneObjective">请选择地块并落位蓝图</span>
        </div>

        <section class="final-home__scene">
          <canvas class="final-home__canvas" id="immersiveMapCanvas" aria-hidden="true"></canvas>

          <div class="brush-label brush-label--hall">
            <span>太清殿</span>
          </div>
          <div class="brush-label brush-label--store">
            <span>仓苑</span>
          </div>
          <div class="brush-label brush-label--alchemy">
            <span>炼丹房</span>
          </div>

          <div class="task-badge task-badge--store">
            <span class="task-badge__icon"></span>
            <strong id="taskBadgeStore">搬运</strong>
          </div>
          <div class="task-badge task-badge--build">
            <span class="task-badge__icon"></span>
            <strong id="taskBadgeBuild">施工</strong>
          </div>

          <button class="interactive-lot interactive-lot--east" id="lotEast" type="button">
            <span>东坪地块</span>
          </button>
          <button class="interactive-lot interactive-lot--south" id="lotSouth" type="button">
            <span>南坡地块</span>
          </button>
          <button class="interactive-lot interactive-lot--west" id="lotWest" type="button">
            <span>西侧地块</span>
          </button>

          <div class="pawn-layer" id="pawnLayer" aria-hidden="true"></div>
        </section>

        <section class="phase1-panel">
          <header class="phase1-panel__head">
            <strong>Phase 1 大地图可玩验证</strong>
            <span>选地块 → 选蓝图 → 落位后自动搬运施工</span>
          </header>
          <div class="phase1-panel__summary">
            <span id="selectedLotReadout">当前地块：未选择</span>
            <span id="selectedBlueprintReadout">当前蓝图：未选择</span>
          </div>
          <div class="phase1-panel__buildings" id="blueprintSelector">
            <button type="button" class="phase1-blueprint-btn is-selected" data-blueprint="alchemy">炼丹房</button>
            <button type="button" class="phase1-blueprint-btn" data-blueprint="herbGarden">药园</button>
            <button type="button" class="phase1-blueprint-btn" data-blueprint="forge">炼器房</button>
          </div>
          <div class="phase1-panel__actions">
            <button class="phase1-action-btn" id="placeBlueprintBtn" type="button">落位蓝图</button>
            <button class="phase1-action-btn is-secondary" id="clearSelectionBtn" type="button">清空选择</button>
          </div>
          <div class="phase1-panel__feedback" id="loopFeedback">请选择一个地块开始验证。</div>
          <div class="phase1-panel__tasks">
            <strong>当前任务流</strong>
            <ul id="taskFlowList"></ul>
          </div>
        </section>

        <section class="final-home__status">
          <div class="status-chip">
            <strong>今日规则</strong>
            <span id="statusRule">搬运 = 建造 > 修炼</span>
          </div>
          <div class="status-chip">
            <strong>当前营造</strong>
            <span id="statusBuild">暂无施工</span>
          </div>
          <div class="status-chip">
            <strong>表现目标</strong>
            <span id="statusPlayable">请完成至少 1 栋建筑的落位与启用</span>
          </div>
        </section>

        <nav class="bottom-dock bottom-dock--final">
          <div class="dock-item is-active">
            <span class="dock-item__icon dock-item__icon--home">
              <span class="dock-glyph"></span>
            </span>
            <span class="dock-item__label">主城</span>
          </div>
          <div class="dock-item">
            <span class="dock-item__icon dock-item__icon--build">
              <span class="dock-glyph"></span>
            </span>
            <span class="dock-item__label">建造</span>
          </div>
          <div class="dock-item">
            <span class="dock-item__icon dock-item__icon--disciples">
              <span class="dock-glyph"></span>
            </span>
            <span class="dock-item__label">弟子</span>
          </div>
          <div class="dock-item">
            <span class="dock-item__icon dock-item__icon--descent">
              <span class="dock-glyph"></span>
            </span>
            <span class="dock-item__label">神降</span>
          </div>
        </nav>
      </section>
    </main>

    <script src="./immersive-map.js"></script>
    <script src="./immersive-loop-phase1.js"></script>
  </body>
</html>
